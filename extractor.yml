name: Extractor de Eventos Deportivos

on:
  schedule:
    # Ejecutar cada 6 horas (cron: minuto hora dia mes dia_semana)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permitir ejecución manual

jobs:
  extract:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Ejecutar extractor
        run: python extractor_eventos.py
      
      - name: Configurar Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
      
      - name: Commit y push del archivo JSON
        run: |
          git add "deportes y eventos.json"
          git diff --staged --quiet || git commit -m "Actualización automática de eventos deportivos [skip ci]"
          git push
